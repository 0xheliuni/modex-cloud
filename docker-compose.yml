services:
  app:
    build: .
    image: modex-cloud:latest
    container_name: modex-cloud
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - TZ=Asia/Shanghai
      # Secrets come from the .env file (see .env.example). Never hard-code here.
      - MASTER_KEK=${MASTER_KEK}
      - SESSION_SECRET=${SESSION_SECRET}
      # SQLite (pure-Go, no MySQL needed). The file lives on the mounted volume
      # below so data survives container rebuilds.
      - SQL_DSN=/data/modex-cloud.db
      - ROOT_USERNAME=${ROOT_USERNAME:-admin}
      - ROOT_PASSWORD=${ROOT_PASSWORD:-}
    volumes:
      - modex_data:/data
    networks: [modex]

volumes:
  modex_data:

networks:
  modex:
    driver: bridge
