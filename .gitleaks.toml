# gitleaks configuration for agt-vault.
# Run: gitleaks detect --config .gitleaks.toml --source .
#
# This extends the default ruleset and adds project-specific allowlists so the
# documented placeholders and test fixtures do not trip the scanner, while real
# provider keys committed by mistake still get caught.

[extend]
useDefault = true

[allowlist]
description = "Project allowlist"
paths = [
  '''\.env\.example$''',
  '''.*_test\.go$''',         # test fixtures use obviously-fake keys
  '''AGT平台接口文档\.txt$''', # vendor doc uses sk-xxxx placeholders
]
regexes = [
  '''sk-xxxx''',
  '''<SYSTEM_ACCESS_TOKEN>''',
  '''agt-super-secret-bearer''',  # curl smoke-test fixture
  '''sk-REALSECRET123''',          # curl smoke-test fixture
]

# Extra rule: catch our six providers' real key shapes anywhere in tracked files.
[[rules]]
id = "anthropic-key"
description = "Anthropic API key"
regex = '''sk-ant-(api|admin)[0-9]{2}-[A-Za-z0-9_\-]{80,}'''
[rules.allowlist]
regexes = ['''sk-ant-api03-(REALSECRET|SECRET)''']

[[rules]]
id = "openai-project-key"
description = "OpenAI project/secret key"
regex = '''sk-(proj-)?[A-Za-z0-9]{40,}'''
[rules.allowlist]
regexes = ['''sk-REALSECRET123''', '''sk-xxxx''']
